name: 'W3 Space and Time Action'
description: 'Decentralized SQL queries and blockchain data via Space and Time'
author: 'w3-io'

inputs:
  command:
    description: 'Operation: query, execute, ddl, list-tables, list-chains'
    required: true

  # Authentication — three modes, resolved in this priority order:
  #   1. Login mode:    user-id + password + biscuit-name (recommended for writes)
  #   2. Explicit JWT:  auth-url + auth-secret (+ optional biscuit)
  #   3. API key:       api-key (read-only indexed chain data via Gateway Proxy)
  api-url:
    description: 'SxT API base URL where SQL is executed'
    required: false
    default: 'https://proxy.api.makeinfinite.dev'
  proxy-url:
    description: 'Make Infinite proxy base URL for login and biscuit lookup'
    required: false
    default: 'https://proxy.api.makeinfinite.dev'
  api-key:
    description: 'SxT API key (Gateway Proxy, read-only indexed data)'
    required: false
  auth-url:
    description: 'Custom JWT token endpoint URL (alternative to api-key)'
    required: false
  auth-secret:
    description: 'Shared secret for custom JWT endpoint'
    required: false
  user-id:
    description: 'SxT userId for proxy login (enables DDL/DML via biscuit-name)'
    required: false
  password:
    description: 'SxT password for proxy login'
    required: false
  biscuit-name:
    description: 'Name of a biscuit registered on the proxy, fetched at runtime'
    required: false
  biscuit:
    description: 'Pre-fetched biscuit token string (alternative to biscuit-name)'
    required: false

  # Shared config
  schema-name:
    description: 'Default schema for resource scoping (e.g. "ETHEREUM", "myapp")'
    required: true
  origin-app:
    description: 'Application identifier for request tracking'
    required: false
    default: 'w3-sxt-action'

  # SQL execution
  sql:
    description: 'SQL statement to execute. WARNING: User-controlled values must not be interpolated directly into SQL strings. Use parameterized values or validate inputs before constructing SQL.'
    required: false
  resources:
    description: 'Comma-separated table references for performance optimization (e.g. "schema.table1,schema.table2")'
    required: false
  query-type:
    description: 'Query type for DQL: OLTP or OLAP (default: OLTP)'
    required: false
    default: 'OLTP'

  # Discovery
  chain:
    description: 'Blockchain name for list-chains (e.g. "ethereum")'
    required: false

  # Retry configuration
  max-retries:
    description: 'Maximum retry attempts (default: 3)'
    required: false
    default: '3'
  retry-delay:
    description: 'Base retry delay in seconds (default: 2)'
    required: false
    default: '2'
  timeout:
    description: 'Request timeout in seconds (default: 30)'
    required: false
    default: '30'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
