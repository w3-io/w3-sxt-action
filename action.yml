name: 'W3 Space and Time Action'
description: 'Decentralized SQL queries and blockchain data via Space and Time'
author: 'w3-io'

inputs:
  command:
    description: 'Operation: query, execute, ddl, list-tables, list-chains'
    required: true

  # Authentication — JWT + Biscuit (recommended)
  # If auth-url and auth-secret are provided, JWT mode is used.
  # Falls back to API key mode if only api-key is provided.
  api-url:
    description: 'SxT API base URL (direct network for JWT, proxy for API key)'
    required: false
    default: 'https://api.spaceandtime.dev'
  auth-url:
    description: 'JWT token endpoint URL (enables JWT mode)'
    required: false
  auth-secret:
    description: 'Shared secret for JWT token fetch'
    required: false
  biscuit-private-key:
    description: 'Ed25519 private key (hex) for signing biscuit authorization tokens'
    required: false

  # Authentication — API key (simpler, less reliable)
  api-key:
    description: 'SxT Gateway API key (fallback if JWT credentials not provided)'
    required: false

  # Shared config
  schema-name:
    description: 'Default schema for resource scoping (e.g. "ETHEREUM", "myapp")'
    required: true
  origin-app:
    description: 'Application identifier for request tracking'
    required: false
    default: 'w3-sxt-action'

  # SQL execution
  sql:
    description: 'SQL statement to execute'
    required: false
  resources:
    description: 'Comma-separated table references for performance optimization (e.g. "schema.table1,schema.table2")'
    required: false
  query-type:
    description: 'Query type for DQL: OLTP or OLAP (default: OLTP)'
    required: false
    default: 'OLTP'

  # Discovery
  chain:
    description: 'Blockchain name for list-chains (e.g. "ethereum")'
    required: false

  # Retry configuration
  max-retries:
    description: 'Maximum retry attempts (default: 3)'
    required: false
    default: '3'
  retry-delay:
    description: 'Base retry delay in seconds (default: 2)'
    required: false
    default: '2'
  timeout:
    description: 'Request timeout in seconds (default: 30)'
    required: false
    default: '30'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node20'
  main: 'dist/index.js'
