kind: integration
partner: sxt
name: Space and Time
version: 1.0.0
repo: w3-io/w3-sxt-action
commands:
  - name: query
    description: >
      Execute a SELECT query. Returns result rows as JSON. Supports
      indexed blockchain data (Ethereum, Bitcoin, Base) and custom tables.
    inputs:
      sql:
        type: string
        required: true
        description: SQL SELECT statement
      resources:
        type: string
        required: false
        description: Comma-separated table references for performance optimization
      query-type:
        type: string
        required: false
        description: 'OLTP or OLAP (default: OLTP)'
    outputs:
      result:
        type: array
        description: Array of result row objects

  - name: execute
    description: >
      Execute DML (INSERT, UPDATE, DELETE). Returns affected row count.
    inputs:
      sql:
        type: string
        required: true
        description: SQL DML statement
      resources:
        type: string
        required: false
        description: Comma-separated table references
    outputs:
      result:
        type: array
        description: '[{UPDATED: <count>}]'

  - name: ddl
    description: >
      Execute DDL (CREATE TABLE, DROP TABLE, ALTER). Manages schema
      and table lifecycle.
    inputs:
      sql:
        type: string
        required: true
        description: SQL DDL statement
    outputs:
      result:
        type: object
        description: '{success: true}'

  - name: discover-schemas
    description: >
      List all schemas visible to the caller via the Discovery API.
    inputs: {}
    outputs:
      result:
        type: array
        description: Schema metadata

  - name: discover-tables
    description: >
      List tables in a schema via the Discovery API. Defaults to
      schema-name if schema input is not provided.
    inputs:
      schema:
        type: string
        required: false
        description: Schema name (defaults to schema-name)
    outputs:
      result:
        type: array
        description: Table metadata

  - name: discover-columns
    description: >
      List columns for a table via the Discovery API.
    inputs:
      schema:
        type: string
        required: false
        description: Schema name (defaults to schema-name)
      table:
        type: string
        required: true
        description: Table name
    outputs:
      result:
        type: array
        description: Column metadata

  - name: discover-primary-keys
    description: >
      List primary-key columns for a table via the Discovery API.
    inputs:
      schema:
        type: string
        required: false
        description: Schema name (defaults to schema-name)
      table:
        type: string
        required: true
        description: Table name
    outputs:
      result:
        type: array
        description: Primary key metadata

  - name: discover-indexes
    description: >
      List indexes for a table via the Discovery API.
    inputs:
      schema:
        type: string
        required: false
        description: Schema name (defaults to schema-name)
      table:
        type: string
        required: true
        description: Table name
    outputs:
      result:
        type: array
        description: Index metadata

  - name: discover-relationships
    description: >
      List foreign-key relationships for a table via the Discovery API.
    inputs:
      schema:
        type: string
        required: false
        description: Schema name (defaults to schema-name)
      table:
        type: string
        required: true
        description: Table name
    outputs:
      result:
        type: array
        description: Relationship/foreign-key metadata

  - name: list-chains
    description: >
      Query latest blocks from an indexed blockchain. Verifies
      connectivity and data availability.
    inputs:
      chain:
        type: string
        required: false
        description: 'Chain name (default: ETHEREUM). Also supports BITCOIN, BASE.'
    outputs:
      result:
        type: array
        description: Latest blocks from the specified chain
