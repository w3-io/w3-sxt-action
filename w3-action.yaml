kind: integration
partner: sxt
name: Space and Time
version: 1.0.0
repo: w3-io/w3-sxt-action
commands:
  - name: query
    description: >
      Execute a SELECT query. Returns result rows as JSON. Supports
      indexed blockchain data (Ethereum, Bitcoin, Base) and custom tables.
    inputs:
      sql:
        type: string
        required: true
        description: SQL SELECT statement
      resources:
        type: string
        required: false
        description: Comma-separated table references for performance optimization
      query-type:
        type: string
        required: false
        description: "OLTP or OLAP (default: OLTP)"
    outputs:
      result:
        type: array
        description: Array of result row objects

  - name: execute
    description: >
      Execute DML (INSERT, UPDATE, DELETE). Returns affected row count.
    inputs:
      sql:
        type: string
        required: true
        description: SQL DML statement
      resources:
        type: string
        required: false
        description: Comma-separated table references
    outputs:
      result:
        type: array
        description: "[{UPDATED: <count>}]"

  - name: ddl
    description: >
      Execute DDL (CREATE TABLE, DROP TABLE, ALTER). Manages schema
      and table lifecycle.
    inputs:
      sql:
        type: string
        required: true
        description: SQL DDL statement
    outputs:
      result:
        type: object
        description: "{success: true}"

  - name: list-tables
    description: List tables in the configured schema.
    inputs: {}
    outputs:
      result:
        type: array
        description: Table metadata

  - name: list-chains
    description: >
      Query latest blocks from an indexed blockchain. Verifies
      connectivity and data availability.
    inputs:
      chain:
        type: string
        required: false
        description: "Chain name (default: ETHEREUM). Also supports BITCOIN, BASE."
    outputs:
      result:
        type: array
        description: Latest blocks from the specified chain
