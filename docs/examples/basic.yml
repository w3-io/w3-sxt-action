# Basic SxT example — read indexed chain data.
#
# Repository secrets needed:
#   SXT_API_KEY    - from https://app.spaceandtime.ai (or the dashboard
#                    your SxT account comes with)
#
# This is read-only. To INSERT/UPDATE/DELETE or CREATE/DROP tables you
# need login mode — see the repo README for setup via
# `npm run generate-biscuit`.

name: SxT example — list recent Ethereum blocks

on:
  workflow_dispatch:

jobs:
  example:
    runs-on: ubuntu-latest
    steps:
      - name: Query latest Ethereum blocks
        id: blocks
        uses: w3-io/w3-sxt-action@v0
        with:
          command: query
          api-key: ${{ secrets.SXT_API_KEY }}
          schema-name: ETHEREUM
          sql: >
            SELECT BLOCK_NUMBER, TIME_STAMP, TRANSACTION_COUNT
            FROM ETHEREUM.BLOCKS
            ORDER BY BLOCK_NUMBER DESC
            LIMIT 5
          resources: ETHEREUM.BLOCKS

      - name: Show results
        run: |
          echo "Latest 5 Ethereum blocks:"
          echo '${{ steps.blocks.outputs.result }}' | jq .
