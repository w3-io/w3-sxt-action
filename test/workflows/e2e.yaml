# E2E Test Workflow
#
# Exercises every command against real APIs using login mode:
# userId + password + biscuit-name. The biscuit must already be
# registered on the Make Infinite proxy and scoped to W3_E2E_TEST.e2e_items
# with DDL/DML/DQL operations.
#
# Run locally with:
#   w3 dev test --execute test/workflows/e2e.yaml
#
# Prerequisites:
#   - Run `npm run generate-biscuit -- --resources=W3_E2E_TEST.e2e_items --biscuit-name=w3-e2e-test`
#     to create the keypair and register the biscuit on the proxy.
#   - Secrets in environment (w3 dev test reads these automatically):
#       SXT_USER_ID, SXT_PASSWORD — SxT account credentials
#       SXT_BISCUIT_NAME         — e.g. "w3-e2e-test"
#       SXT_TABLE_PUBLIC_KEY     — hex pubkey printed by generate-biscuit

name: sxt-e2e
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── Discovery (read-only, REST /v2/discover/* on api.makeinfinite.dev) ──

      - name: Discover schemas
        uses: w3-io/w3-sxt-action@v0
        with:
          command: discover-schemas
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: ETHEREUM

      - name: Discover tables in ETHEREUM
        uses: w3-io/w3-sxt-action@v0
        with:
          command: discover-tables
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: ETHEREUM

      - name: Discover columns in ETHEREUM.BLOCKS
        uses: w3-io/w3-sxt-action@v0
        with:
          command: discover-columns
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: ETHEREUM
          table: BLOCKS

      - name: Discover primary keys in ETHEREUM.BLOCKS
        uses: w3-io/w3-sxt-action@v0
        with:
          command: discover-primary-keys
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: ETHEREUM
          table: BLOCKS

      - name: Discover indexes in ETHEREUM.BLOCKS
        uses: w3-io/w3-sxt-action@v0
        with:
          command: discover-indexes
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: ETHEREUM
          table: BLOCKS

      - name: Discover relationships in ETHEREUM
        uses: w3-io/w3-sxt-action@v0
        with:
          command: discover-relationships
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: ETHEREUM
          table: BLOCKS

      # ── SQL: read indexed chain data ───────────────────────────────────────

      - name: List recent Ethereum blocks
        uses: w3-io/w3-sxt-action@v0
        with:
          command: list-chains
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: ETHEREUM

      # ── DDL — Create the test table anchored to our biscuit keypair ────────

      - name: Create the test table
        uses: w3-io/w3-sxt-action@v0
        with:
          command: ddl
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: W3_E2E_TEST
          sql: 'CREATE TABLE W3_E2E_TEST.e2e_items (id INT PRIMARY KEY, name VARCHAR, value DECIMAL(18,2)) WITH "public_key=${{ secrets.SXT_TABLE_PUBLIC_KEY }},access_type=public_read"'

      # ── DML — Insert test data ─────────────────────────────────────────────

      - name: Insert test rows
        uses: w3-io/w3-sxt-action@v0
        with:
          command: execute
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: W3_E2E_TEST
          sql: "INSERT INTO W3_E2E_TEST.e2e_items (id, name, value) VALUES (1, 'alpha', 10.50), (2, 'beta', 25.00), (3, 'gamma', 42.99)"
          resources: W3_E2E_TEST.e2e_items

      # ── DQL — Query the data ───────────────────────────────────────────────

      - name: Query all rows
        uses: w3-io/w3-sxt-action@v0
        with:
          command: query
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: W3_E2E_TEST
          sql: 'SELECT * FROM W3_E2E_TEST.e2e_items ORDER BY id'
          resources: W3_E2E_TEST.e2e_items

      - name: Query with filter
        uses: w3-io/w3-sxt-action@v0
        with:
          command: query
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: W3_E2E_TEST
          sql: 'SELECT name, value FROM W3_E2E_TEST.e2e_items WHERE value > 20'
          resources: W3_E2E_TEST.e2e_items

      # ── Cleanup — Drop the test table ──────────────────────────────────────

      - name: Drop the test table
        uses: w3-io/w3-sxt-action@v0
        with:
          command: ddl
          user-id: ${{ secrets.SXT_USER_ID }}
          password: ${{ secrets.SXT_PASSWORD }}
          biscuit-name: ${{ secrets.SXT_BISCUIT_NAME }}
          schema-name: W3_E2E_TEST
          sql: 'DROP TABLE W3_E2E_TEST.e2e_items'
